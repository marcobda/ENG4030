<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - Vendedor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background-color: #f9f9f9;
            margin: 10px 0;
            padding: 15px;
            border-radius: 5px;
            border-left: 5px solid #4CAF50;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            margin-top: 20px;
        }
        button:hover {
            background-color: #45a049;
        }
        .back {
            display: block;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tela do Vendedor</h1>
        <p>Aqui estão as demandas de compra dos compradores:</p>
        <ul id="demandsList"></ul>
        <button onclick="loadDemands()">Atualizar Lista</button>
        <button class="back" onclick="window.location.href='index.html'">Voltar</button>
    </div>
    <script>
        function loadDemands() {
            const demands = JSON.parse(localStorage.getItem('demands')) || [];
            const list = document.getElementById('demandsList');
            list.innerHTML = '';
            if (demands.length === 0) {
                list.innerHTML = '<li>Nenhuma demanda registrada ainda.</li>';
            } else {
                demands.forEach(demand => {
                    const li = document.createElement('li');
                    li.textContent = demand;
                    list.appendChild(li);
                });
            }
        }
        // Carregar demandas ao abrir a página
        window.onload = loadDemands;
    </script>
</body>
</html>
