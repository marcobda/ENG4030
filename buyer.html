<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - Comprador</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 400px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
        }
        button:hover {
            background-color: #45a049;
        }
        .back {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tela do Comprador</h1>
        <p>Descreva o produto que deseja comprar:</p>
        <textarea id="productDescription" placeholder="Ex: Um smartphone Android com câmera de 48MP"></textarea>
        <br>
        <button onclick="submitDemand()">Enviar Demanda</button>
        <br>
        <button class="back" onclick="window.location.href='index.html'">Voltar</button>
    </div>
    <script>
        function submitDemand() {
            const description = document.getElementById('productDescription').value.trim();
            if (description) {
                let demands = JSON.parse(localStorage.getItem('demands')) || [];
                demands.push(description);
                localStorage.setItem('demands', JSON.stringify(demands));
                alert('Demanda enviada com sucesso!');
                document.getElementById('productDescription').value = '';
            } else {
                alert('Por favor, descreva o produto.');
            }
        }
    </script>
</body>
</html>
